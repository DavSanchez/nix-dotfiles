name: Linux Builder Test
on:
  workflow_dispatch:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  linux-builder-test:
    name: Test Linux Builder VM on macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Free up space
        run: bash .github/scripts/space_cleanup.sh

      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - uses: cachix/cachix-action@v17
        with:
          name: davsanchez
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Activate minimal linux-builder config
        run: sudo nix run nix-darwin -- switch --flake .#linux-builder-test

      - name: Wait for VM and run smoke test
        run: |
          set +e
          for i in $(seq 1 12); do
            echo "Attempt $i/12: building trivial aarch64-linux derivation..."
            nix build --system aarch64-linux --expr '"linux-builder-smoke-test"' --no-link 2>&1
            if [ $? -eq 0 ]; then
              echo "Linux builder is responsive"
              exit 0
            fi
            echo "Attempt $i failed, waiting 5s for VM to start..."
            sleep 5
          done
          echo "Linux builder failed to become responsive after 60s"
          exit 1

      - name: Capture diagnostics on failure
        if: failure()
        run: |
          mkdir -p diagnostics

          echo "=== launchctl print ===" > diagnostics/launchctl.txt
          sudo launchctl print system/org.nixos.linux-builder >> diagnostics/launchctl.txt 2>&1 || true

          echo "=== system logs ===" > diagnostics/logs.txt
          log show --predicate 'process CONTAINS "qemu" OR process CONTAINS "linux-builder" OR process CONTAINS "create-builder"' --last 10m --style compact >> diagnostics/logs.txt 2>&1 || true

          echo "=== crash reports ===" > diagnostics/crashes.txt
          for f in $(ls -t /Library/Logs/DiagnosticReports/qemu-system-aarch64*.ips 2>/dev/null | head -3); do
            echo "--- $f ---" >> diagnostics/crashes.txt
            python3 -c "
          import json
          with open('$f') as fh:
              fh.readline()
              data = json.load(fh)
          print('Exception:', json.dumps(data.get('exception', {}), indent=2))
          print('Termination:', json.dumps(data.get('termination', {}), indent=2))
          print('ASI:', json.dumps(data.get('asi', {}), indent=2))
          ft = data.get('faultingThread', -1)
          if ft >= 0:
              thread = data['threads'][ft]
              print(f'Faulting thread: {ft} ({thread.get(\"name\", \"unknown\")})')
              for i, frame in enumerate(thread.get('frames', [])[:10]):
                  print(f'  {i}: {frame.get(\"symbol\", \"\")} (offset {frame.get(\"imageOffset\", \"\")})')
          " >> diagnostics/crashes.txt 2>&1 || true
          done

        continue-on-error: true

      - name: Upload diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: linux-builder-diagnostics
          path: diagnostics/
        continue-on-error: true

      # - name: Push Linux builder VM closure to Cachix
      #   run: |
      #     nix path-info --recursive \
      #       ".#darwinConfigurations.linux-builder-test.config.nix.linux-builder.package.nixosConfig.system.build.toplevel" \
      #       | cachix push davsanchez

      - name: Build nix-darwin (solio)
        run: nix run nix-darwin -- build --flake .#solio

      - name: Build nix-darwin (sierpe)
        run: nix run nix-darwin -- build --flake .#sierpe
