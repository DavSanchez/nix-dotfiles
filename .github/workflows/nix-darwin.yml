name: Nix Darwin
on:
  workflow_dispatch:
  push:
    branches:
      - master
      - renovate/**
    paths:
      - 'hosts/**'
      - 'flake.nix'
      - 'flake.lock'
      - '.github/workflows/nix-darwin.yml'
  pull_request:
    paths:
      - 'hosts/**'
      - 'flake.nix'
      - 'flake.lock'
      - '.github/workflows/nix-darwin.yml'

jobs:
  build:
    name: Build nix-darwin configs (with Linux builder smoke test)
    runs-on: macos-latest
    strategy:
      matrix:
        host: [solio, sierpe]
    steps:
      - uses: actions/checkout@v6

      - name: Free up space
        run: bash .github/scripts/space_cleanup.sh

      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - uses: cachix/cachix-action@v17
        with:
          name: davsanchez
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Backup existing system files
        run: |
          for f in /etc/nix/nix.conf /etc/bashrc /etc/zshrc; do
            if [ -f "$f" ]; then
              sudo mv "$f" "${f}.before-nix-darwin"
              echo "Renamed $f to ${f}.before-nix-darwin"
            fi
          done

      # Activate a minimal nix-darwin config that only enables the Linux builder VM.
      # This bootstrap builder is needed by our real nix-darwin configs (solio/sierpe)
      # which configure their own Linux builder with x86_64 emulation support.
      - name: Activate bootstrap Linux builder
        run: >
          sudo nix run
          --access-tokens "github.com=${{ secrets.GITHUB_TOKEN }}"
          --extra-experimental-features 'nix-command flakes'
          github:nix-darwin/nix-darwin/master#darwin-rebuild
          --
          switch --flake .#linux-builder-test

      - name: Smoke test Linux builder VM
        run: |
          set +e

          sleep 60

          echo "=== QEMU process ==="
          pgrep -fl qemu || echo "No QEMU process found"

          echo "=== Port 31022 ==="
          lsof -i :31022 2>&1 || echo "Nothing listening on 31022"

          echo "=== launchd service ==="
          sudo launchctl print system/org.nixos.linux-builder 2>&1 | head -40 || true

          echo "=== Recent crash reports ==="
          ls -lt /Library/Logs/DiagnosticReports/qemu*.ips 2>/dev/null | head -3 || echo "No QEMU crash reports"

          echo "=== System log (last 50 QEMU-related) ==="
          log show --predicate 'process CONTAINS "qemu" OR process CONTAINS "linux-builder"' --last 5m --style compact 2>&1 | tail -50 || true

          for i in $(seq 1 24); do
            echo "Attempt $i/24: building trivial aarch64-linux derivation..."
            nix build --system aarch64-linux \
              --expr 'builtins.derivation { name = "smoke-test"; system = "aarch64-linux"; builder = "/bin/sh"; args = ["-c" "echo ok > $out"]; }' \
              --no-link 2>&1
            if [ $? -eq 0 ]; then
              echo "Linux builder is responsive"
              exit 0
            fi
            echo "Attempt $i failed, waiting 5s for VM to boot..."
            sleep 5
          done
          echo "Linux builder failed to become responsive after 120s"
          exit 1

      - name: Capture diagnostics on failure
        if: failure()
        run: |
          mkdir -p diagnostics

          echo "=== launchctl print ===" > diagnostics/launchctl.txt
          sudo launchctl print system/org.nixos.linux-builder >> diagnostics/launchctl.txt 2>&1 || true

          echo "=== system logs ===" > diagnostics/logs.txt
          log show --predicate 'process CONTAINS "qemu" OR process CONTAINS "linux-builder" OR process CONTAINS "create-builder"' --last 10m --style compact >> diagnostics/logs.txt 2>&1 || true

          echo "=== crash reports ===" > diagnostics/crashes.txt
          for f in $(ls -t /Library/Logs/DiagnosticReports/qemu-system-aarch64*.ips 2>/dev/null | head -3); do
            echo "--- $f ---" >> diagnostics/crashes.txt
            python3 -c "
          import json
          with open('$f') as fh:
              fh.readline()
              data = json.load(fh)
          print('Exception:', json.dumps(data.get('exception', {}), indent=2))
          print('Termination:', json.dumps(data.get('termination', {}), indent=2))
          print('ASI:', json.dumps(data.get('asi', {}), indent=2))
          ft = data.get('faultingThread', -1)
          if ft >= 0:
              thread = data['threads'][ft]
              print(f'Faulting thread: {ft} ({thread.get(\"name\", \"unknown\")})')
              for i, frame in enumerate(thread.get('frames', [])[:10]):
                  print(f'  {i}: {frame.get(\"symbol\", \"\")} (offset {frame.get(\"imageOffset\", \"\")})')
          " >> diagnostics/crashes.txt 2>&1 || true
          done
        continue-on-error: true

      - name: Upload diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: linux-builder-diagnostics
          path: diagnostics/
        continue-on-error: true

      # - name: Push Linux builder VM closure to Cachix
      #   run: |
      #     nix path-info --recursive \
      #       ".#darwinConfigurations.linux-builder-test.config.nix.linux-builder.package.nixosConfig.system.build.toplevel" \
      #       | cachix push davsanchez

      - name: Build nix-darwin (${{ matrix.host }})
        run: |
          set +e
          
          SSH_CFG="/etc/ssh/ssh_config.d/100-linux-builder.conf"
          if [ -f "$SSH_CFG" ]; then
            echo "Found SSH config: $SSH_CFG"
            cat "$SSH_CFG"
            export NIX_SSHOPTS="-F $SSH_CFG"
          else
            echo "WARNING: $SSH_CFG not found"
            ls -la /etc/ssh/ssh_config.d/ 2>&1 || true
          fi
          
          # building with --impure so $NIX_SSHOPTS is seen, not sure if this is needed
          nix run github:nix-darwin/nix-darwin/master#darwin-rebuild \
            --access-tokens "github.com=${{ secrets.GITHUB_TOKEN }}" \
            -- build --flake .#${{ matrix.host }} --impure

  check:
    name: 🟢 Decide whether the needed jobs succeeded or failed
    if: always()
    needs:
      - build
    runs-on: ubuntu-latest
    steps:
      - uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}
